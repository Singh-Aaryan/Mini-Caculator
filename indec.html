<!DOCTYPE html>
<html>
<head>
    <title>Mini Calculator</title>

    <style>
        body{
            background-color: #dfe7d8;
            font-family: Arial;
        }

        .container{
            width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
        }

        input{
            width: 300px;
            height: 40px;
            font-size: 20px;
            margin: 10px;
            padding-left: 10px;
        }

        button{
            padding: 15px 25px;
            font-size: 20px;
            margin: 20px;
            cursor: pointer;
        }

        #result{
            margin-top: 30px;
            font-size: 35px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Day 1: Assignment-2 Mini Calculator Github Repo Link *</h2>

    <input type="number" id="num1" placeholder="enter 1st Number">

    <input type="number" id="num2" placeholder="enter 2nd Number">

    <br>

    <button onclick="add()">Add</button>

    <button onclick="subtract()">Subtract</button>

    <button onclick="multiply()">Multiply</button>

    <button onclick="divide()">Divide</button>

    <h1 id="result">Result :</h1>

</div>

<script>

function add() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);

    document.getElementById("result").innerHTML =
        "Result : " + (a + b);
}

function subtract() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);

    document.getElementById("result").innerHTML =
        "Result : " + (a - b);
}

function multiply() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);

    document.getElementById("result").innerHTML =
        "Result : " + (a * b);
}

function divide() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);

    if (b == 0) {
        document.getElementById("result").innerHTML =
            "Cannot divide by zero";
    }
    else {
        document.getElementById("result").innerHTML =
            "Result : " + (a / b);
    }
}

</script>

</body>
</html>
